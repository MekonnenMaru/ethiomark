<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ኢትዮ-ማርክ ቢንጎ — Login</title>
<script src="/db.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;}
body{
  background:radial-gradient(ellipse at 60% 0%,#0d2a4a 0%,#050e1a 60%);
  display:flex;align-items:center;justify-content:center;min-height:100vh;
  overflow:hidden;
}

/* animated background dots */
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle,rgba(0,198,255,0.06) 1px,transparent 1px);
  background-size:32px 32px;pointer-events:none;
}

.login-wrap{
  width:100%;max-width:420px;padding:24px 16px;
  display:flex;flex-direction:column;align-items:center;gap:28px;
  position:relative;z-index:1;
}

/* logo / brand */
.brand-block{text-align:center;}
.brand-logo{
  width:72px;height:72px;border-radius:50%;
  background:linear-gradient(135deg,#00c6ff,#0072ff);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;margin:0 auto 14px;
  box-shadow:0 0 32px rgba(0,198,255,0.35);
}
.brand-name{
  font-size:26px;font-weight:800;letter-spacing:0.5px;
  background:linear-gradient(90deg,#00c6ff,#7b61ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.brand-sub{font-size:13px;color:rgba(255,255,255,0.45);margin-top:4px;letter-spacing:1px;}

/* card */
.login-card{
  width:100%;border-radius:20px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(16px);
  padding:32px 28px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5);
}
.card-title{
  font-size:17px;font-weight:700;color:rgba(255,255,255,0.85);
  margin-bottom:24px;text-align:center;letter-spacing:0.3px;
}

/* field */
.field{position:relative;margin-bottom:18px;}
.field label{
  display:block;font-size:11px;font-weight:700;
  color:rgba(255,255,255,0.45);letter-spacing:1.2px;text-transform:uppercase;
  margin-bottom:8px;
}
.field input{
  width:100%;padding:13px 16px;border-radius:12px;outline:none;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  color:#fff;font-size:15px;transition:border-color .2s,box-shadow .2s;
}
.field input::placeholder{color:rgba(255,255,255,0.25);}
.field input:focus{
  border-color:rgba(0,198,255,0.6);
  box-shadow:0 0 0 3px rgba(0,198,255,0.1);
  background:rgba(255,255,255,0.08);
}
.field .eye-btn{
  position:absolute;right:14px;bottom:13px;
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,0.35);font-size:16px;padding:0;
  transition:color .2s;
}
.field .eye-btn:hover{color:rgba(255,255,255,0.7);}

/* error */
.error-msg{
  display:none;align-items:center;gap:8px;
  background:rgba(255,82,82,0.12);border:1px solid rgba(255,82,82,0.3);
  border-radius:10px;padding:10px 14px;
  color:#ff5252;font-size:13px;font-weight:600;margin-bottom:16px;
}
.error-msg.show{display:flex;}

/* submit */
.submit-btn{
  width:100%;padding:14px;border-radius:12px;border:none;cursor:pointer;
  background:linear-gradient(135deg,#0072ff,#00c6ff);
  color:#fff;font-size:16px;font-weight:800;letter-spacing:0.5px;
  transition:opacity .2s,transform .15s;
  box-shadow:0 4px 18px rgba(0,114,255,0.4);
}
.submit-btn:hover{opacity:0.92;transform:translateY(-1px);}
.submit-btn:active{transform:translateY(0);}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none;}

/* footer note */
.login-note{font-size:12px;color:rgba(255,255,255,0.25);text-align:center;}

/* spinner inside button */
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .6s linear infinite;vertical-align:middle;margin-right:8px;
}
</style>
</head>
<body>

<div class="login-wrap">

  <div class="brand-block">
    <div class="brand-logo">🎱</div>
    <div class="brand-name">ኢትዮ-ማርክ ቢንጎ</div>
    <div class="brand-sub">CASHIER PORTAL</div>
  </div>

  <div class="login-card">
    <div class="card-title">Sign in to your account</div>

    <div class="error-msg" id="errMsg">
      <span>⚠</span><span id="errText">Invalid credentials. Please try again.</span>
    </div>

    <form id="loginForm" autocomplete="off">
      <div class="field">
        <label>Cashier ID</label>
        <input type="text" id="cashierId" placeholder="@cashier_id" required autofocus autocomplete="username">
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        <button type="button" class="eye-btn" id="eyeBtn" title="Show/Hide">👁</button>
      </div>
      <button type="submit" class="submit-btn" id="loginBtn">Sign In</button>
    </form>
  </div>

  <div class="login-note">Ethiomark Bingo Management System</div>
</div>

<script>
/* ── tiny MD5 (RFC 1321) ── */
function md5(s){
  function safeAdd(x,y){var lsw=(x&0xffff)+(y&0xffff);return((x>>16)+(y>>16)+(lsw>>16)<<16)|(lsw&0xffff);}
  function bitRotateLeft(n,c){return n<<c|n>>>32-c;}
  function md5cmn(q,a,b,x,s,t){return safeAdd(bitRotateLeft(safeAdd(safeAdd(a,q),safeAdd(x,t)),s),b);}
  function md5ff(a,b,c,d,x,s,t){return md5cmn(b&c|~b&d,a,b,x,s,t);}
  function md5gg(a,b,c,d,x,s,t){return md5cmn(b&d|c&~d,a,b,x,s,t);}
  function md5hh(a,b,c,d,x,s,t){return md5cmn(b^c^d,a,b,x,s,t);}
  function md5ii(a,b,c,d,x,s,t){return md5cmn(c^(b|~d),a,b,x,s,t);}
  s=unescape(encodeURIComponent(s));
  var m=[],l=s.length;
  for(var i=0;i<l;i++) m[i>>2]|=s.charCodeAt(i)<<(i%4)*8;
  m[l>>2]|=0x80<<(l%4)*8;
  m[((l+8>>6)+1)*16-2]=l*8;
  var a=1732584193,b=-271733879,c=-1732584194,d=271733878;
  for(i=0;i<m.length;i+=16){
    var oa=a,ob=b,oc=c,od=d;
    a=md5ff(a,b,c,d,m[i],7,-680876936);d=md5ff(d,a,b,c,m[i+1],12,-389564586);c=md5ff(c,d,a,b,m[i+2],17,606105819);b=md5ff(b,c,d,a,m[i+3],22,-1044525330);
    a=md5ff(a,b,c,d,m[i+4],7,-176418897);d=md5ff(d,a,b,c,m[i+5],12,1200080426);c=md5ff(c,d,a,b,m[i+6],17,-1473231341);b=md5ff(b,c,d,a,m[i+7],22,-45705983);
    a=md5ff(a,b,c,d,m[i+8],7,1770035416);d=md5ff(d,a,b,c,m[i+9],12,-1958414417);c=md5ff(c,d,a,b,m[i+10],17,-42063);b=md5ff(b,c,d,a,m[i+11],22,-1990404162);
    a=md5ff(a,b,c,d,m[i+12],7,1804603682);d=md5ff(d,a,b,c,m[i+13],12,-40341101);c=md5ff(c,d,a,b,m[i+14],17,-1502002290);b=md5ff(b,c,d,a,m[i+15],22,1236535329);
    a=md5gg(a,b,c,d,m[i+1],5,-165796510);d=md5gg(d,a,b,c,m[i+6],9,-1069501632);c=md5gg(c,d,a,b,m[i+11],14,643717713);b=md5gg(b,c,d,a,m[i],20,-373897302);
    a=md5gg(a,b,c,d,m[i+5],5,-701558691);d=md5gg(d,a,b,c,m[i+10],9,38016083);c=md5gg(c,d,a,b,m[i+15],14,-660478335);b=md5gg(b,c,d,a,m[i+4],20,-405537848);
    a=md5gg(a,b,c,d,m[i+9],5,568446438);d=md5gg(d,a,b,c,m[i+14],9,-1019803690);c=md5gg(c,d,a,b,m[i+3],14,-187363961);b=md5gg(b,c,d,a,m[i+8],20,1163531501);
    a=md5gg(a,b,c,d,m[i+13],5,-1444681467);d=md5gg(d,a,b,c,m[i+2],9,-51403784);c=md5gg(c,d,a,b,m[i+7],14,1735328473);b=md5gg(b,c,d,a,m[i+12],20,-1926607734);
    a=md5hh(a,b,c,d,m[i+5],4,-378558);d=md5hh(d,a,b,c,m[i+8],11,-2022574463);c=md5hh(c,d,a,b,m[i+11],16,1839030562);b=md5hh(b,c,d,a,m[i+14],23,-35309556);
    a=md5hh(a,b,c,d,m[i+1],4,-1530992060);d=md5hh(d,a,b,c,m[i+4],11,1272893353);c=md5hh(c,d,a,b,m[i+7],16,-155497632);b=md5hh(b,c,d,a,m[i+10],23,-1094730640);
    a=md5hh(a,b,c,d,m[i+13],4,681279174);d=md5hh(d,a,b,c,m[i],11,-358537222);c=md5hh(c,d,a,b,m[i+3],16,-722521979);b=md5hh(b,c,d,a,m[i+6],23,76029189);
    a=md5hh(a,b,c,d,m[i+9],4,-640364487);d=md5hh(d,a,b,c,m[i+12],11,-421815835);c=md5hh(c,d,a,b,m[i+15],16,530742520);b=md5hh(b,c,d,a,m[i+2],23,-995338651);
    a=md5ii(a,b,c,d,m[i],6,-198630844);d=md5ii(d,a,b,c,m[i+7],10,1126891415);c=md5ii(c,d,a,b,m[i+14],15,-1416354905);b=md5ii(b,c,d,a,m[i+5],21,-57434055);
    a=md5ii(a,b,c,d,m[i+12],6,1700485571);d=md5ii(d,a,b,c,m[i+3],10,-1894986606);c=md5ii(c,d,a,b,m[i+10],15,-1051523);b=md5ii(b,c,d,a,m[i+1],21,-2054922799);
    a=md5ii(a,b,c,d,m[i+8],6,1873313359);d=md5ii(d,a,b,c,m[i+15],10,-30611744);c=md5ii(c,d,a,b,m[i+6],15,-1560198380);b=md5ii(b,c,d,a,m[i+13],21,1309151649);
    a=md5ii(a,b,c,d,m[i+4],6,-145523070);d=md5ii(d,a,b,c,m[i+11],10,-1120210379);c=md5ii(c,d,a,b,m[i+2],15,718787259);b=md5ii(b,c,d,a,m[i+9],21,-343485551);
    a=safeAdd(a,oa);b=safeAdd(b,ob);c=safeAdd(c,oc);d=safeAdd(d,od);
  }
  var hex='',chars='0123456789abcdef';
  [a,b,c,d].forEach(n=>{for(var j=0;j<4;j++){var by=(n>>j*8)&0xff;hex+=chars[by>>4]+chars[by&0xf];}});
  return hex;
}

/* ── session helpers ── */
function getSession(){ return localStorage.getItem('em_cashier_id'); }
function setSession(id){ localStorage.setItem('em_cashier_id', id); }

/* ── already logged in? skip login ── */
if(getSession()) location.replace('/');

/* ── DB cashier seed data (from SQL dump) ── */
const SEED_CASHIERS = [
  { id: '@temp1', password_hash: 'a01610228fe998f515a72dd730294d87',
    settings_json: '{"bonus":{"status":"on","amount":"50","per_day":"1"},"system":{"check_result":"auto","color_mode":"two","profit":"12","good_bingo_sound":"1"},"toggles":{"will_start":true,"started":true,"stopped":true,"show_card_count":true}}' }
];

async function ensureCashiers(){
  await EthiomarkDB.openDB();
  await EthiomarkDB.seedCashiers(SEED_CASHIERS);
}

/* ── UI ── */
const eyeBtn   = document.getElementById('eyeBtn');
const pwdInput = document.getElementById('password');
const loginBtn = document.getElementById('loginBtn');
const errMsg   = document.getElementById('errMsg');
const errText  = document.getElementById('errText');

eyeBtn.addEventListener('click', () => {
  const show = pwdInput.type === 'password';
  pwdInput.type = show ? 'text' : 'password';
  eyeBtn.textContent = show ? '🙈' : '👁';
});

function showError(msg){
  errText.textContent = msg;
  errMsg.classList.add('show');
}
function hideError(){ errMsg.classList.remove('show'); }

document.getElementById('loginForm').addEventListener('submit', async e => {
  e.preventDefault();
  hideError();
  loginBtn.disabled = true;
  loginBtn.innerHTML = '<span class="spinner"></span>Signing in…';

  const id  = document.getElementById('cashierId').value.trim();
  const pwd = document.getElementById('password').value;

  if (!id || !pwd) {
    showError('Please enter your Cashier ID and Password.');
    loginBtn.disabled = false; loginBtn.textContent = 'Sign In'; return;
  }

  try {
    const cashier = await EthiomarkDB.getCashier(id);
    if (!cashier) { showError('Cashier ID not found.'); loginBtn.disabled=false; loginBtn.innerHTML='Sign In'; return; }
    const hash = md5(pwd);
    if (hash !== cashier.password_hash) {
      showError('Incorrect password. Please try again.');
      loginBtn.disabled=false; loginBtn.innerHTML='Sign In'; return;
    }
    setSession(id);
    location.replace('/');
  } catch(err) {
    showError('Login error. Please refresh and try again.');
    loginBtn.disabled=false; loginBtn.innerHTML='Sign In';
  }
});

ensureCashiers();
</script>
</body>
</html>
