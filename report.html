<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Report — Ethiomark Bingo</title>
<script src="/bootstrap/js/jquery.js"></script>
<script src="/db.js"></script>
<script src="/api.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#080f1e;color:#e8eaf6;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;}

/* ── top nav ── */
.topnav{background:#0d1b35;border-bottom:1px solid #1a2d50;display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:56px;position:sticky;top:0;z-index:100;}
.topnav-brand{font-size:17px;font-weight:900;color:#00c6ff;letter-spacing:.3px;}
.topnav-user{font-size:13px;color:#7986cb;font-weight:600;}
.topnav-links{display:flex;align-items:center;gap:8px;}
.topnav-links a,.topnav-links button{text-decoration:none;font-size:13px;font-weight:700;padding:7px 14px;border-radius:8px;cursor:pointer;border:1px solid transparent;transition:all .18s;}
.btn-back{background:rgba(255,255,255,0.05);color:#90caf9;border-color:rgba(255,255,255,0.1);}
.btn-back:hover{background:rgba(255,255,255,0.1);}
.btn-logout{background:rgba(229,57,53,0.12);color:#ef9a9a;border-color:rgba(229,57,53,0.25);}
.btn-logout:hover{background:rgba(229,57,53,0.2);}

/* ── content ── */
.page{max-width:960px;margin:0 auto;padding:28px 20px 60px;}

/* ── section title ── */
.section-title{font-size:12px;font-weight:800;letter-spacing:1.4px;text-transform:uppercase;color:#4a6fa5;margin-bottom:14px;padding-left:2px;}

/* ── wallet card ── */
.wallet-card{background:linear-gradient(135deg,#0d2240,#0a1a35);border:1px solid #1e3a5f;border-radius:18px;padding:24px 28px;margin-bottom:32px;position:relative;overflow:hidden;}
.wallet-card::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(0,198,255,0.08),transparent 70%);pointer-events:none;}
.wallet-row{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.wallet-item{flex:1;min-width:130px;}
.wallet-item .wi-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#4a6fa5;margin-bottom:6px;}
.wallet-item .wi-value{font-size:26px;font-weight:900;letter-spacing:-.3px;}
.wallet-item .wi-sub{font-size:11px;color:#546e7a;margin-top:2px;}
.wallet-divider{width:1px;height:50px;background:rgba(255,255,255,0.07);flex-shrink:0;}
.wi-deposited{color:#90caf9;}
.wi-used{color:#ef9a9a;}
.wi-avail{color:#69f0ae;}
.wi-avail-low{color:#ffd740;}
.wi-avail-empty{color:#ff5252;}
.wallet-machine{margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.06);font-size:12px;color:#4a6fa5;}
.wallet-machine span{color:#546e7a;font-family:monospace;font-size:13px;letter-spacing:1px;}

/* ── date filter ── */
.filter-card{background:#0d1b35;border:1px solid #1a2d50;border-radius:14px;padding:16px 20px;margin-bottom:28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.filter-card label{font-size:12px;font-weight:700;color:#4a6fa5;letter-spacing:.5px;white-space:nowrap;}
.filter-card input[type=date]{padding:8px 12px;border-radius:8px;border:1px solid #1a3a5c;background:#080f1e;color:#e8eaf6;font-size:14px;outline:none;transition:border-color .2s;}
.filter-card input[type=date]:focus{border-color:#1976d2;}
.filter-card .fc-spacer{flex:1;}
.btn-today{padding:8px 16px;border-radius:8px;border:none;background:rgba(56,142,60,0.2);color:#a5d6a7;font-size:13px;font-weight:700;cursor:pointer;border:1px solid rgba(56,142,60,0.3);transition:all .18s;}
.btn-today:hover{background:rgba(56,142,60,0.35);}
.btn-search{padding:8px 20px;border-radius:8px;border:none;background:#1565c0;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .18s;}
.btn-search:hover{background:#0d47a1;}
.btn-export{padding:8px 16px;border-radius:8px;border:none;background:rgba(245,124,0,0.15);color:#ffb74d;font-size:13px;font-weight:700;cursor:pointer;border:1px solid rgba(245,124,0,0.25);transition:all .18s;}
.btn-export:hover{background:rgba(245,124,0,0.3);}

/* ── summary cards ── */
.summary-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:28px;}
.sc{background:#0d1b35;border:1px solid #1a2d50;border-radius:14px;padding:16px 18px;}
.sc .sc-l{font-size:11px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#4a6fa5;margin-bottom:8px;}
.sc .sc-v{font-size:24px;font-weight:900;}
.sc .sc-u{font-size:11px;color:#546e7a;margin-top:3px;}

/* ── game history ── */
.history-wrap{background:#0d1b35;border:1px solid #1a2d50;border-radius:16px;overflow:hidden;}
.history-head{padding:16px 20px;border-bottom:1px solid #1a2d50;display:flex;align-items:center;justify-content:space-between;}
.history-head h3{font-size:15px;font-weight:800;color:#90caf9;}
.history-head .hh-count{font-size:12px;color:#4a6fa5;font-weight:600;}
.table-scroll{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
th{background:#080f1e;color:#4a6fa5;padding:11px 14px;font-size:11px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;text-align:left;border-bottom:1px solid #1a2d50;}
td{padding:13px 14px;font-size:14px;border-bottom:1px solid rgba(26,45,80,0.6);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(21,101,192,0.08);}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;letter-spacing:.3px;}
.badge-win{background:rgba(27,94,32,0.4);color:#69f0ae;border:1px solid rgba(105,240,174,0.2);}
.badge-stopped{background:rgba(74,20,140,0.4);color:#ce93d8;border:1px solid rgba(206,147,216,0.2);}
.badge-played{background:rgba(13,71,161,0.4);color:#90caf9;border:1px solid rgba(144,202,249,0.2);}
.patt-tag{display:inline-block;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:2px 8px;font-size:11px;color:#90caf9;}
.empty{text-align:center;padding:60px 20px;color:#37474f;}
.empty svg{display:block;margin:0 auto 12px;opacity:.3;}
.empty p{font-size:16px;margin-bottom:6px;}
.empty small{font-size:13px;}

@media(max-width:640px){
  .topnav-links a span,.topnav-links button span{display:none;}
  .wallet-divider{display:none;}
  th:nth-child(4),td:nth-child(4),th:nth-child(5),td:nth-child(5){display:none;}
}
</style>
</head>
<body>
<script>if(!API.getSession()){location.replace('/login.html');}</script>

<!-- top nav -->
<nav class="topnav">
  <div class="topnav-brand">ኢትዮ-ማርክ ቢንጎ</div>
  <div class="topnav-links">
    <a href="/" class="btn-back">← ወደ ጨዋታ</a>
    <button class="btn-logout" onclick="if(confirm('Logout?')){API.clearSession();location.href='/login.html';}">Logout</button>
  </div>
  <div class="topnav-user" id="sideUsername">@cashier</div>
</nav>

<div class="page">

  <!-- ── Wallet status ── -->
  <div class="section-title">Wallet Status</div>
  <div class="wallet-card">
    <div class="wallet-row">
      <div class="wallet-item">
        <div class="wi-label">Total Deposited</div>
        <div class="wi-value wi-deposited" id="w-deposited">—</div>
        <div class="wi-sub">ብር</div>
      </div>
      <div class="wallet-divider"></div>
      <div class="wallet-item">
        <div class="wi-label">Amount Used</div>
        <div class="wi-value wi-used" id="w-used">—</div>
        <div class="wi-sub">ብር</div>
      </div>
      <div class="wallet-divider"></div>
      <div class="wallet-item">
        <div class="wi-label">Remaining Balance</div>
        <div class="wi-value" id="w-avail">—</div>
        <div class="wi-sub">ብር</div>
      </div>
    </div>
    <div class="wallet-machine">Machine ID: <span id="w-mid">—</span></div>
  </div>

  <!-- ── Date filter ── -->
  <div class="section-title">Game History</div>
  <div class="filter-card">
    <label>DATE</label>
    <input type="date" id="dateFrom">
    <label>TO</label>
    <input type="date" id="dateTo">
    <button class="btn-today" onclick="setToday()">Today</button>
    <button class="btn-search" onclick="loadReport()">Search</button>
    <div class="fc-spacer"></div>
    <button class="btn-export" onclick="exportCSV()">⬇ CSV</button>
  </div>

  <!-- ── Summary cards ── -->
  <div class="summary-row" id="summaryRow"></div>

  <!-- ── History table ── -->
  <div class="history-wrap">
    <div class="history-head">
      <h3>Rounds</h3>
      <div class="hh-count" id="hh-count">—</div>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Round</th>
            <th>Time</th>
            <th>Cards</th>
            <th>Price/Card</th>
            <th>Revenue</th>
            <th>Pattern</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="reportBody">
          <tr><td colspan="8" class="empty" style="text-align:center;padding:40px;color:#4a6fa5;">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
const PATTERN_NAMES={1:'Any 1 Line',2:'Any 2 Lines',3:'Horizontal',4:'Vertical',5:'X Pattern',6:'Four Corners',7:'Center Corners',8:'Meskel',9:'T Shape',10:'Reverse T',11:'L Shape',12:'Full Card'};

window._historyCache=[];
window._settingsCache={};

async function init(){
  const sess = API.getSession();
  document.getElementById('sideUsername').textContent = sess||'@cashier';

  /* load data in parallel */
  const [bal,mid,hist,settings] = await Promise.all([
    API.getBalance(), API.getMachineId(),
    API.getHistory(), API.getSettings()
  ]);
  window._historyCache  = hist;
  window._settingsCache = settings;

  /* wallet display */
  document.getElementById('w-deposited').textContent = bal.deposited.toLocaleString();
  document.getElementById('w-used').textContent      = bal.used.toLocaleString();
  const availEl = document.getElementById('w-avail');
  availEl.textContent = bal.available.toLocaleString();
  availEl.className = 'wi-value ' + (bal.available<=0?'wi-avail-empty':bal.available<1000?'wi-avail-low':'wi-avail');
  document.getElementById('w-mid').textContent = mid.match(/.{1,4}/g).join('-');

  setToday();
}

function setToday(){
  const t = new Date().toISOString().split('T')[0];
  document.getElementById('dateFrom').value = t;
  document.getElementById('dateTo').value   = t;
  loadReport();
}

function loadReport(){
  const from = new Date(document.getElementById('dateFrom').value+'T00:00:00');
  const to   = new Date(document.getElementById('dateTo').value+'T23:59:59');
  const filtered = window._historyCache.filter(g=>{
    const d=new Date(g.date); return d>=from && d<=to;
  });
  renderSummary(filtered);
  renderTable(filtered);
}

function renderSummary(games){
  const totalGames  = games.length;
  const totalCards  = games.reduce((s,g)=>s+g.cards.length,0);
  const totalRev    = games.reduce((s,g)=>s+(g.cards.length*g.price),0);
  const avgCards    = totalGames ? Math.round(totalCards/totalGames) : 0;
  document.getElementById('summaryRow').innerHTML = `
    <div class="sc"><div class="sc-l">Rounds</div><div class="sc-v" style="color:#90caf9;">${totalGames}</div></div>
    <div class="sc"><div class="sc-l">Total Cards</div><div class="sc-v" style="color:#80cbc4;">${totalCards}</div></div>
    <div class="sc"><div class="sc-l">Total Revenue</div><div class="sc-v" style="color:#69f0ae;">${totalRev.toLocaleString()}</div><div class="sc-u">ብር</div></div>
    <div class="sc"><div class="sc-l">Avg Cards/Round</div><div class="sc-v" style="color:#ffcc80;">${avgCards}</div></div>
  `;
}

function renderTable(games){
  const tbody=document.getElementById('reportBody');
  document.getElementById('hh-count').textContent = games.length ? games.length+' rounds' : 'No rounds';
  if(!games.length){
    tbody.innerHTML=`<tr><td colspan="8" class="empty" style="text-align:center;padding:50px;">
      <svg width="40" height="40" fill="none" viewBox="0 0 24 24"><path stroke="#546e7a" stroke-width="1.5" d="M9 17H7A5 5 0 0 1 7 7h2M15 7h2a5 5 0 0 1 0 10h-2M8 12h8"/></svg>
      <p>No rounds found</p><small>Try a different date range</small></td></tr>`;
    return;
  }
  tbody.innerHTML=[...games].reverse().map((g,idx)=>{
    const revenue=g.cards.length*g.price;
    const timeStr=new Date(g.date).toLocaleTimeString('en-ET',{hour:'2-digit',minute:'2-digit',hour12:true});
    const badge=g.status==='win'?'<span class="badge badge-win">✓ Win</span>'
      :g.status==='stopped'?'<span class="badge badge-stopped">Stopped</span>'
      :'<span class="badge badge-played">Played</span>';
    const pattName=PATTERN_NAMES[g.pattern]||('Pattern '+g.pattern);
    return `<tr>
      <td style="color:#4a6fa5;font-size:12px;">${games.length-idx}</td>
      <td style="font-weight:800;color:#90caf9;">Round ${g.round}</td>
      <td style="font-size:13px;color:#7986cb;">${timeStr}</td>
      <td style="font-weight:700;">${g.cards.length}</td>
      <td style="color:#7986cb;">${g.price.toLocaleString()} ብር</td>
      <td style="font-weight:900;color:#69f0ae;">${revenue.toLocaleString()} ብር</td>
      <td><span class="patt-tag">${pattName}</span></td>
      <td>${badge}</td>
    </tr>`;
  }).join('');
}

function exportCSV(){
  const hist=window._historyCache;
  if(!hist.length){alert('No history to export.');return;}
  let csv='Round,Date,Cards,Price,Revenue,Pattern,Status\n';
  hist.forEach(g=>{
    const revenue=g.cards.length*g.price;
    csv+=`${g.round},"${new Date(g.date).toLocaleString()}",${g.cards.length},${g.price},${revenue},${PATTERN_NAMES[g.pattern]||g.pattern},${g.status||'played'}\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download='ethiomark_report.csv';
  a.click();
}

init();
</script>
</body>
</html>
