<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Spin to Win – ኢትዮ-ማርክ ቢንጎ</title>
  <script src="db.js"></script>
  <script src="api.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;}
    body{
      background:radial-gradient(ellipse at 20% 10%, #0d1f4a 0%, #020b18 55%, #010810 100%);
      display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
      font-family:'Segoe UI',system-ui,sans-serif;color:#e0e8ff;min-height:100vh;
    }

    /* ── top bar ── */
    .top-bar{
      width:100%;display:flex;align-items:center;justify-content:space-between;
      padding:12px 18px 8px;border-bottom:1px solid rgba(0,198,255,0.12);
      background:rgba(7,20,40,0.7);backdrop-filter:blur(6px);flex-shrink:0;
    }
    .top-bar h1{font-size:16px;font-weight:900;letter-spacing:1px;
      background:linear-gradient(90deg,#00c6ff,#b040ff);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .btn-back{
      display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:30px;
      background:rgba(255,82,82,0.14);border:1px solid rgba(255,82,82,0.35);
      color:#ff8a80;font-size:13px;font-weight:700;cursor:pointer;transition:.2s;
      text-decoration:none;
    }
    .btn-back:hover{background:#c62828;color:#fff;border-color:#c62828;}

    /* ── round tag ── */
    .round-tag{
      display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:800;
      letter-spacing:1px;background:rgba(0,198,255,0.12);border:1px solid rgba(0,198,255,0.3);
      color:#00c6ff;
    }

    /* ── main stage ── */
    .stage{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      width:100%;padding:10px 16px 10px;gap:12px;overflow:hidden;
    }

    /* ── no-cards panel ── */
    #no-cards-panel{
      display:none;flex-direction:column;align-items:center;gap:18px;text-align:center;
    }
    #no-cards-panel p{color:#90a4b8;font-size:15px;line-height:1.6;max-width:300px;}
    .btn-load-prev{
      padding:12px 28px;border-radius:30px;font-size:15px;font-weight:800;cursor:pointer;
      background:linear-gradient(135deg,#7b61ff,#b040ff);border:none;color:#fff;
      box-shadow:0 4px 24px rgba(123,97,255,0.45);transition:.2s;
    }
    .btn-load-prev:hover{transform:scale(1.04);}

    /* ── wheel wrapper ── */
    #wheel-wrap{position:relative;display:flex;align-items:center;justify-content:center;}

    /* ── pointer (triangle at top) ── */
    #pointer{
      position:absolute;top:-18px;left:50%;transform:translateX(-50%);
      width:0;height:0;
      border-left:14px solid transparent;border-right:14px solid transparent;
      border-top:30px solid #ff4444;
      filter:drop-shadow(0 0 8px #ff4444) drop-shadow(0 0 18px #ff4444);
      z-index:10;
    }

    /* ── center hub ── */
    #hub{
      position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
      width:54px;height:54px;border-radius:50%;
      background:radial-gradient(circle,#1a2e55,#0d1f3c);
      border:3px solid rgba(0,198,255,0.7);
      box-shadow:0 0 18px rgba(0,198,255,0.5),0 0 36px rgba(0,198,255,0.2),inset 0 0 12px rgba(0,0,0,0.6);
      display:flex;align-items:center;justify-content:center;
      font-size:20px;z-index:11;
    }

    /* ── spin button ── */
    #spin-btn{
      padding:14px 48px;border-radius:50px;font-size:18px;font-weight:900;cursor:pointer;
      background:linear-gradient(135deg,#00c6ff 0%,#0072ff 50%,#7b61ff 100%);
      border:none;color:#fff;letter-spacing:2px;
      box-shadow:0 6px 32px rgba(0,198,255,0.45),0 2px 8px rgba(0,0,0,0.4);
      transition:.18s;position:relative;overflow:hidden;
    }
    #spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important;}
    #spin-btn:not(:disabled):hover{transform:scale(1.04);box-shadow:0 8px 40px rgba(0,198,255,0.6);}
    #spin-btn::after{
      content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;
      background:rgba(255,255,255,0.18);transform:skewX(-20deg);
      animation:sheen 3s infinite;
    }
    @keyframes sheen{0%{left:-60%}100%{left:130%}}

    /* ── card count label ── */
    .card-label{font-size:13px;color:#5a7a9a;font-weight:600;letter-spacing:.5px;}

    /* ── winner overlay ── */
    #winner-overlay{
      display:none;position:fixed;inset:0;z-index:999;
      background:rgba(2,11,24,0.92);backdrop-filter:blur(8px);
      flex-direction:column;align-items:center;justify-content:center;gap:24px;
    }
    #winner-overlay.show{display:flex;}
    #winner-confetti{position:fixed;inset:0;pointer-events:none;z-index:998;}
    .winner-label{
      font-size:15px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
      color:#90a4b8;
    }
    .winner-number{
      font-size:clamp(72px,20vw,128px);font-weight:900;line-height:1;
      background:linear-gradient(135deg,#ffd740,#ff6d00,#ff4081);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      filter:drop-shadow(0 0 24px rgba(255,215,64,0.5));
      animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both;
    }
    @keyframes popIn{from{transform:scale(0) rotate(-15deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
    .winner-card-id{
      font-size:14px;color:#5a7a9a;letter-spacing:2px;
    }
    .winner-sub{font-size:18px;color:#80cbc4;font-weight:700;letter-spacing:1px;}
    .btn-spin-again{
      margin-top:8px;padding:13px 36px;border-radius:50px;font-size:16px;font-weight:800;
      cursor:pointer;background:linear-gradient(135deg,#00e676,#00c853);
      border:none;color:#003300;letter-spacing:1px;
      box-shadow:0 4px 20px rgba(0,230,118,0.4);transition:.2s;
    }
    .btn-spin-again:hover{transform:scale(1.05);}

    /* scrollbar */
    ::-webkit-scrollbar{width:5px;}
    ::-webkit-scrollbar-track{background:rgba(255,255,255,0.03);}
    ::-webkit-scrollbar-thumb{background:rgba(0,198,255,0.25);border-radius:3px;}
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<div class="top-bar">
  <a class="btn-back" href="index.html">← Back</a>
  <h1>🎡 Spin to Win</h1>
  <span class="round-tag" id="round-tag">Round —</span>
</div>

<!-- ── Main stage ── -->
<div class="stage">

  <!-- No-cards state -->
  <div id="no-cards-panel">
    <svg width="56" height="56" fill="none" viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="10" stroke="#2a4060" stroke-width="1.5"/>
      <path d="M12 8v4m0 4h.01" stroke="#4a6880" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <p>No cards are registered for the current round.</p>
    <button class="btn-load-prev" id="load-prev-btn">Load from Previous Round</button>
    <p id="no-prev-msg" style="display:none;color:#ff7043;font-size:13px;">No previous round found either.</p>
  </div>

  <!-- Wheel + pointer + hub -->
  <div id="wheel-wrap" style="display:none;">
    <div id="pointer"></div>
    <canvas id="wheel-canvas"></canvas>
    <div id="hub">🎯</div>
  </div>

  <!-- Card count -->
  <p class="card-label" id="card-label" style="display:none;"></p>

  <!-- Spin button -->
  <button id="spin-btn" style="display:none;" onclick="doSpin()">SPIN</button>

</div>

<!-- ── Winner overlay ── -->
<canvas id="winner-confetti"></canvas>
<div id="winner-overlay">
  <div class="winner-label">🏆 Winner Card</div>
  <div class="winner-number" id="winner-number">—</div>
  <div class="winner-sub">ድል ！</div>
  <button class="btn-spin-again" onclick="resetSpin()">Spin Again</button>
</div>

<script>
/* ═══════════════════════════════════════════════════════
   CONSTANTS & GLOBALS
═══════════════════════════════════════════════════════ */
const SECTOR_COLORS = [
  ['#ff4081','#c2185b'], ['#7c4dff','#4527a0'], ['#00bcd4','#00838f'],
  ['#ff6d00','#e65100'], ['#00e676','#00796b'], ['#ffd740','#f57f17'],
  ['#40c4ff','#01579b'], ['#ff5252','#b71c1c'], ['#69f0ae','#1b5e20'],
  ['#ea80fc','#6a1b9a'], ['#ffab40','#bf360c'], ['#18ffff','#006064'],
];

let cards          = [];
let angle          = 0;       // current rotation (radians)
let velocity       = 0;       // radians per frame
let friction       = 0.991;   // set per-spin
let spinning       = false;
let rafId          = null;
let winnerIdx      = -1;
let cSize          = 300;
let lastSectorIdx  = -1;      // for tick detection
let audioCtx       = null;

/* ═══════════════════════════════════════════════════════
   BOOTSTRAP
═══════════════════════════════════════════════════════ */
window.onload = async () => {
  await API.init();
  const gs = await API.getGameState();
  document.getElementById('round-tag').textContent = 'Round ' + (gs.round || 1);

  if (gs.cards && gs.cards.length > 0) {
    loadCards(gs.cards);
  } else {
    showNoCards();
  }

  document.getElementById('load-prev-btn').onclick = async () => {
    try {
      const hist = await API.getHistory();
      /* find last entry with non-empty cards */
      const prev = (hist || []).find(h => h.cards && h.cards.length > 0);
      if (prev) {
        loadCards(prev.cards);
        document.getElementById('no-cards-panel').style.display = 'none';
      } else {
        document.getElementById('no-prev-msg').style.display = 'block';
      }
    } catch(e) {
      document.getElementById('no-prev-msg').style.display = 'block';
    }
  };
};

function showNoCards() {
  document.getElementById('no-cards-panel').style.display = 'flex';
}

function loadCards(list) {
  cards = [...new Set(list)].sort((a, b) => a - b);
  if (cards.length === 0) { showNoCards(); return; }
  initWheel();
}

/* ═══════════════════════════════════════════════════════
   WHEEL INIT
═══════════════════════════════════════════════════════ */
function initWheel() {
  const wrap  = document.getElementById('wheel-wrap');
  const btn   = document.getElementById('spin-btn');
  const lbl   = document.getElementById('card-label');
  const canvas= document.getElementById('wheel-canvas');

  /* responsive size: stay within viewport */
  const vw = Math.min(window.innerWidth  * 0.88, 480);
  const vh = Math.min(window.innerHeight * 0.54, 480);
  cSize = Math.floor(Math.min(vw, vh));
  if (cSize < 200) cSize = 200;

  canvas.width  = cSize;
  canvas.height = cSize;
  canvas.style.borderRadius = '50%';
  canvas.style.boxShadow    = '0 0 40px rgba(0,198,255,0.25), 0 0 80px rgba(0,198,255,0.08)';

  /* hub size */
  const hub = document.getElementById('hub');
  const hubPx = Math.round(cSize * 0.16);
  hub.style.width  = hubPx + 'px';
  hub.style.height = hubPx + 'px';
  hub.style.fontSize = Math.round(hubPx * 0.45) + 'px';

  lbl.textContent = cards.length + ' cards registered';
  wrap.style.display = 'flex';
  lbl.style.display  = 'block';
  btn.style.display  = 'inline-block';

  drawWheel();
}

/* ═══════════════════════════════════════════════════════
   DRAW WHEEL
═══════════════════════════════════════════════════════ */
function drawWheel() {
  const canvas = document.getElementById('wheel-canvas');
  const ctx    = canvas.getContext('2d');
  const n      = cards.length;
  const cx     = cSize / 2;
  const cy     = cSize / 2;
  const r      = cSize / 2 - 4;
  const arc    = (Math.PI * 2) / n;

  ctx.clearRect(0, 0, cSize, cSize);

  for (let i = 0; i < n; i++) {
    const startA = angle + i * arc - Math.PI / 2;
    const endA   = startA + arc;
    const pair   = SECTOR_COLORS[i % SECTOR_COLORS.length];

    /* sector fill */
    const grad = ctx.createRadialGradient(cx, cy, r * 0.18, cx, cy, r);
    grad.addColorStop(0, pair[0] + 'dd');
    grad.addColorStop(1, pair[1] + 'cc');
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startA, endA);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    /* sector border */
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, startA, endA);
    ctx.closePath();
    ctx.strokeStyle = 'rgba(0,0,0,0.35)';
    ctx.lineWidth   = 1.5;
    ctx.stroke();

    /* label */
    const midA = startA + arc / 2;
    const labelR = r * (n <= 12 ? 0.68 : n <= 24 ? 0.72 : 0.76);
    const tx = cx + labelR * Math.cos(midA);
    const ty = cy + labelR * Math.sin(midA);

    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(midA + Math.PI / 2);

    const fs = n <= 10 ? 15 : n <= 20 ? 12 : n <= 40 ? 9 : n <= 60 ? 7 : 5;
    ctx.font      = `900 ${fs}px 'Segoe UI',sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.shadowColor  = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur   = 4;
    ctx.fillText(cards[i], 0, 0);
    ctx.restore();
  }

  /* outer rim */
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,198,255,0.55)';
  ctx.lineWidth   = 3.5;
  ctx.shadowColor = '#00c6ff';
  ctx.shadowBlur  = 12;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

/* ═══════════════════════════════════════════════════════
   AUDIO  (Web Audio API — no external files)
═══════════════════════════════════════════════════════ */
function getAudioCtx() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}

/* Crisp ratchet click — pitch rises when fast, falls when slow */
function playTick(fast) {
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    const bufLen = Math.floor(ctx.sampleRate * 0.018);
    const buf    = ctx.createBuffer(1, bufLen, ctx.sampleRate);
    const data   = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufLen * 0.12));
    }
    const src    = ctx.createBufferSource();
    src.buffer   = buf;

    const filt   = ctx.createBiquadFilter();
    filt.type    = 'bandpass';
    filt.frequency.value = fast ? 2200 : 700;
    filt.Q.value = 4;

    const gain   = ctx.createGain();
    gain.gain.value = fast ? 0.25 : 0.55;

    src.connect(filt); filt.connect(gain); gain.connect(ctx.destination);
    src.start();
  } catch(e) {}
}

/* Ascending fanfare on winner reveal */
function playWinSound() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  try {
    [523, 659, 784, 1047, 1319].forEach((freq, i) => {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type   = 'sine';
      osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.14;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.32, t + 0.04);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t + 0.5);
    });
  } catch(e) {}
}

/* ═══════════════════════════════════════════════════════
   SPIN PHYSICS  (exponential friction — natural feel)
═══════════════════════════════════════════════════════ */
function doSpin() {
  if (spinning) return;
  spinning      = true;
  winnerIdx     = -1;
  lastSectorIdx = -1;

  /* Resume AudioContext if suspended (browser policy) */
  const ctx = getAudioCtx();
  if (ctx && ctx.state === 'suspended') ctx.resume();

  const btn = document.getElementById('spin-btn');
  btn.disabled    = true;
  btn.textContent = 'SPINNING…';

  /* Friction 0.990-0.993 → ~8-12 full rotations, ~9-13 seconds */
  friction = 0.990 + Math.random() * 0.003;
  /* Initial velocity: ~0.38-0.50 rad/frame */
  velocity = 0.38 + Math.random() * 0.12;

  spinFrame();
}

function spinFrame() {
  /* Exponential deceleration */
  velocity *= friction;
  angle    += velocity;

  /* ── Tick sound: fire when pointer crosses a sector boundary ── */
  if (cards.length > 0) {
    const arc  = (Math.PI * 2) / cards.length;
    const norm = ((-angle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
    const sec  = Math.floor(norm / arc) % cards.length;
    if (sec !== lastSectorIdx) {
      playTick(velocity > 0.12);
      lastSectorIdx = sec;
    }
  }

  drawWheel();

  /* Stop threshold: ~0.0006 rad/frame feels like it truly crawls to a halt */
  if (velocity > 0.0006) {
    rafId = requestAnimationFrame(spinFrame);
  } else {
    velocity = 0;
    spinning = false;
    revealWinner();
  }
}

/* ═══════════════════════════════════════════════════════
   WINNER CALCULATION
═══════════════════════════════════════════════════════ */
function revealWinner() {
  const n   = cards.length;
  const arc = (Math.PI * 2) / n;

  /* pointer is at -π/2 (top). Find which sector is under it.
     The sector i starts at angle + i*arc - π/2.
     Pointer is at 0 relative to normalised angle → sector under pointer
     is the one where (−angle) mod 2π falls in [i*arc, (i+1)*arc).         */
  const norm = ((-angle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
  winnerIdx  = Math.floor(norm / arc) % n;

  const winCard = cards[winnerIdx];
  document.getElementById('winner-number').textContent = winCard;

  /* fanfare + confetti burst */
  playWinSound();
  startConfetti();

  setTimeout(() => {
    document.getElementById('winner-overlay').classList.add('show');
  }, 300);
}

/* ═══════════════════════════════════════════════════════
   CONFETTI
═══════════════════════════════════════════════════════ */
let confettiParticles = [];
let confettiRaf       = null;

function startConfetti() {
  const canvas = document.getElementById('winner-confetti');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  confettiParticles = [];
  const colors = ['#ffd740','#ff4081','#00e676','#40c4ff','#ea80fc','#ff6d00','#00bcd4'];

  for (let i = 0; i < 140; i++) {
    confettiParticles.push({
      x:  Math.random() * canvas.width,
      y:  Math.random() * canvas.height - canvas.height,
      w:  6 + Math.random() * 8,
      h:  4 + Math.random() * 5,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 4,
      vy: 2 + Math.random() * 4,
      rot: Math.random() * Math.PI * 2,
      rv:  (Math.random() - 0.5) * 0.2,
      life: 1,
    });
  }

  function drawConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    let alive = false;
    for (const p of confettiParticles) {
      p.x   += p.vx;
      p.y   += p.vy;
      p.vy  += 0.08;
      p.rot += p.rv;
      if (p.y < canvas.height + 20) alive = true;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.globalAlpha = Math.max(0, 1 - p.y / (canvas.height * 1.2));
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    }
    if (alive) confettiRaf = requestAnimationFrame(drawConfetti);
    else ctx.clearRect(0, 0, canvas.width, canvas.height);
  }
  if (confettiRaf) cancelAnimationFrame(confettiRaf);
  confettiRaf = requestAnimationFrame(drawConfetti);
}

/* ═══════════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════════ */
function resetSpin() {
  if (confettiRaf) { cancelAnimationFrame(confettiRaf); confettiRaf = null; }
  const cvc = document.getElementById('winner-confetti');
  cvc.getContext('2d').clearRect(0, 0, cvc.width, cvc.height);

  document.getElementById('winner-overlay').classList.remove('show');

  const btn = document.getElementById('spin-btn');
  btn.disabled    = false;
  btn.textContent = 'SPIN';
  spinning        = false;
  velocity        = 0;
}
</script>
</body>
</html>
